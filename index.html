<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paginação</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="paginacao" id="paginacao">
    <button class="btn seta" data-acao="primeira" title="Primeira">&laquo;</button>
    <button class="btn seta" data-acao="anterior" title="Anterior">&lsaquo;</button>

    <div class="numeros" id="numeros"></div>

    <button class="btn seta" data-acao="proxima" title="Próxima">&rsaquo;</button>
    <button class="btn seta" data-acao="ultima" title="Última">&raquo;</button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
